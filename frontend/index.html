<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Go Chess Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <h1>Go Chess Engine</h1>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="status">White to move</div>

    <button type="button" id="restart-button">New Game</button>

    <div id="game-over-overlay" class="game-over-overlay hidden" aria-hidden="true">
        <div id="game-over-card" class="game-over-card" role="dialog" aria-labelledby="game-over-title" aria-describedby="game-over-subtitle">
            <div id="game-over-badge" class="game-over-badge" aria-hidden="true"></div>
            <h2 id="game-over-title" class="game-over-title"></h2>
            <p id="game-over-subtitle" class="game-over-subtitle"></p>
            <button type="button" id="game-over-restart" class="game-over-restart">Play again</button>
        </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script src="wasm-init.js"></script>
    <script src="script.js"></script>

</body>

</html>
